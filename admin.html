<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - pixora_Cute.clicks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="admin-body">

    <nav class="navbar solid-nav">
        <div class="nav-container">
            <h1 class="logo">pixora_Admin</h1>
            <ul class="nav-links">
                <li><a href="index.html">Back to Site</a></li>
                <li id="logout-btn-container" style="display:none;"><a href="#" id="admin-logout"
                        class="active">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="admin-main">
        <!-- Login Section -->
        <section id="login-section" class="admin-login-container">
            <h2>Owner Login</h2>
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="admin-password">Password</label>
                    <input type="password" id="admin-password" required placeholder="Enter admin password">
                </div>
                <button type="submit" class="btn-submit">Login</button>
                <div id="login-error" class="form-message error-msg"></div>
            </form>
        </section>

        <!-- Dashboard Section (Hidden by default) -->
        <section id="dashboard-section" class="dashboard-container" style="display: none;">
            <div class="dashboard-header">
                <h2>Customer Orders</h2>
                <button id="refresh-orders" class="btn-refresh">Refresh Data <i class="fas fa-sync-alt"></i></button>
            </div>

            <div class="table-container">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Date</th>
                            <th>Customer Name</th>
                            <th>Customer Email</th>
                            <th>Contact Num</th>
                            <th>Delivery Location</th>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Payment ID</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table-body">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginSection = document.getElementById('login-section');
            const dashboardSection = document.getElementById('dashboard-section');
            const loginForm = document.getElementById('admin-login-form');
            const loginError = document.getElementById('login-error');
            const ordersTableBody = document.getElementById('orders-table-body');
            const logoutBtnContainer = document.getElementById('logout-btn-container');
            const refreshBtn = document.getElementById('refresh-orders');

            let authToken = localStorage.getItem('adminToken');

            // Quick check if already logged in
            if (authToken) {
                showDashboard();
            }

            // Login Logic
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const password = document.getElementById('admin-password').value;
                loginError.textContent = '';

                try {
                    const finalUrl = window.location.protocol === 'file:'
                        ? 'http://localhost:3000/api/admin/login'
                        : '/api/admin/login';

                    const response = await fetch(finalUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password })
                    });

                    const data = await response.json();

                    if (data.success) {
                        authToken = data.token;
                        localStorage.setItem('adminToken', authToken);
                        showDashboard();
                    } else {
                        loginError.textContent = data.error || 'Login failed';
                    }
                } catch (err) {
                    loginError.textContent = 'Server connection error';
                }
            });

            // Logout Logic
            document.getElementById('admin-logout').addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('adminToken');
                authToken = null;
                loginSection.style.display = 'block';
                dashboardSection.style.display = 'none';
                logoutBtnContainer.style.display = 'none';
                document.getElementById('admin-password').value = '';
            });

            refreshBtn.addEventListener('click', fetchOrders);

            function showDashboard() {
                loginSection.style.display = 'none';
                dashboardSection.style.display = 'block';
                logoutBtnContainer.style.display = 'inline-block';
                fetchOrders();
            }

            async function fetchOrders() {
                ordersTableBody.innerHTML = '<tr><td colspan="7" style="text-align:center;">Loading orders...</td></tr>';

                try {
                    const finalUrl = window.location.protocol === 'file:'
                        ? 'http://localhost:3000/api/orders'
                        : '/api/orders';

                    const response = await fetch(finalUrl, {
                        headers: { 'Authorization': `Bearer ${authToken}` }
                    });

                    if (response.status === 403 || response.status === 401) {
                        // Token invalid/expired
                        document.getElementById('admin-logout').click();
                        return;
                    }

                    const orders = await response.json();
                    renderOrders(orders);
                } catch (err) {
                    ordersTableBody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:red;">Error loading data.</td></tr>';
                }
            }

            function renderOrders(orders) {
                if (!orders || orders.length === 0) {
                    ordersTableBody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No orders found.</td></tr>';
                    return;
                }

                ordersTableBody.innerHTML = orders.map(order => `
                    <tr>
                        <td>#${order.id}</td>
                        <td>${new Date(order.created_at).toLocaleString()}</td>
                        <td style="font-weight:600;">${escapeHTML(order.customer_name)}</td>
                        <td><a href="mailto:${escapeHTML(order.customer_email)}" style="color:#2e5bc0;">${escapeHTML(order.customer_email)}</a></td>
                        <td>${escapeHTML(order.contact_number)}</td>
                        <td>${escapeHTML(order.delivery_location || '—')}</td>
                        <td>${escapeHTML(order.product_name)}</td>
                        <td style="color:#2e7d32; font-weight:600;">₹${order.price}</td>
                        <td><code style="background:#f0f0f0; padding:2px 5px; border-radius:4px;">${escapeHTML(order.payment_id || '—')}</code></td>
                        <td><span style="background:#e8f5e9; color:#2e7d32; padding:3px 8px; border-radius:12px; font-size:0.8rem;">${order.status}</span></td>
                    </tr>
                `).join('');
            }

            // basic XSS prevention for rendering
            function escapeHTML(str) {
                return (str || '').replace(/[&<>'"]/g,
                    tag => ({
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        "'": '&#39;',
                        '"': '&quot;'
                    }[tag])
                );
            }
        });
    </script>
</body>

</html>
